<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>
</head>

<body style="background:#050515; color:white; text-align:center; font-family:Arial;">

<h2>📱 ShipPro Login</h2>

<input type="text" id="phone" placeholder="07XXXXXXXX">

<br><br>

<button onclick="login()">Enter Game</button>

<p id="msg"></p>

<script>
function login() {

    let phone = document.getElementById("phone").value;
    let pattern = /^07\d{8}$/;

    if (!pattern.test(phone)) {
        document.getElementById("msg").innerText = "❌ Invalid number";
        return;
    }

    localStorage.setItem("shippro_user", phone);
    window.location.href = "index.html";
}
</script>

</body>
</html>
